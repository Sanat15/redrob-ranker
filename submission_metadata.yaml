# ── Scoring Weights ───────────────────────────────────────────────────────────
# title_career (35%) is now split into three independently-weighted
# components so a strong title alone can't carry a weak career history.
component_weights:
  title: 0.12
  career_domain: 0.15
  company_fit: 0.08
  skills: 0.30
  experience: 0.15
  location: 0.10
  education: 0.02
production_evidence_bonus_max: 0.12
behavioral_multiplier_range: "0.25 – 1.02"
high_throughput_bonus_range: "1.0 – 1.15 (gated behind title/skills relevance)"
hard_gate_multiplier_range: "0.15 – 1.0 (non-tech title / consulting-only / impossible location / CV-without-NLP-IR)"

# ── AI Tools Declaration ──────────────────────────────────────────────────────
ai_tools_used:
  - "Claude (Anthropic)"

ai_usage_summary: |
  Used Claude for architectural discussion, code review, and test case design.
  All scoring logic, weights, and design decisions were authored by the team.
  No candidate data was fed to any LLM. The final ranker is pure rule-based
  Python with no ML model or pre-trained embeddings.

# ── Methodology Summary ───────────────────────────────────────────────────────
methodology_summary: |
  Rule-based trust-weighted scoring pipeline v4. Seven weighted components:
  title (12%), career_domain (15%), company_fit (8%), skills (30%),
  experience (15%), location (10%), education (2%). Skills use a trust
  formula = proficiency_weight × min(1, endorsements/25) × min(1,
  duration_months/18) — an expert skill with 0 months used = 0.0 trust,
  defeating keyword stuffing without any ML. Production-evidence bonus
  (up to +0.12) is category-based (retrieval/ranking/recommendation,
  evaluation, ownership, operations, scale) with concept-level semantic
  matching, recognizing both IR vocabulary (BM25, NDCG) and production-ML
  vocabulary (XGBoost, discovery feed, offline-online correlation).
  Behavioral multiplier (0.25-1.02x) applied multiplicatively. A full
  100K-candidate audit found three JD-explicit disqualifiers (non-tech
  title, pure-consulting career, outside-India+non-relocating+onsite)
  still reaching moderate scores on the other 80-90% of component weight,
  so v4 adds explicit multiplicative hard gates for those three plus a
  fourth for CV/speech-without-NLP/IR exposure, closes a loophole where
  the high-throughput bonus applied to unrelated roles, and fixes a
  title-chaser job-hopping loophole in the career-progression bonus.
  Honeypots (expert+0-months skills, impossible career timelines,
  reversed dates) detected first, scored 0.01. Streaming heapq
  O(N log K) — only top-100 ever in memory. Runtime: ~70-90s for 100K
  candidates on CPU.

# ── Key Design Decisions ──────────────────────────────────────────────────────
key_design_decisions:
  - "Career descriptions ARE scanned (career_evidence_score, production_evidence_score) — category-based signal matching, not raw keyword frequency, so recycled templates can't be gamed by repetition"
  - "Trust formula on skills — proficiency × endorsements × duration_months defeats keyword stuffing"
  - "Behavioral multiplier is multiplicative, not additive — makes availability penalties severe"
  - "Consulting-firm career modifier is 0.45 (company_fit_score), plus a v4 ×0.35 hard-gate multiplier on the whole score — the 8% component weight alone let a pure-consulting profile reach rank 232 in a full 100K audit"
  - "Production-evidence bonus uses concept-level semantic matching, not keyword presence"
  - "Offline-online correlation uses co-occurrence heuristic (both terms + correlation verb) not literal phrases"
  - "Production-evidence bonus capped at 0.12 (up from 0.07) — more weight than education for ranking role"
  - "Education weight reduced to 0.02 (10% -> 5% -> 2%) — JD has no education requirement"
  - "v4 hard gates (non-tech title x0.15, consulting-only x0.35, impossible-location x0.55, CV/speech-without-NLP-IR x0.80) close a real gap found by auditing the full 100K dataset, not a theoretical one"
  - "heapq O(N log K) — only top-100 ever held in memory"
  - "saved_by_recruiters_30d used only as sort tiebreaker, never a score multiplier"
  - "No external APIs or GPU — pure stdlib Python for the ranking pipeline"

