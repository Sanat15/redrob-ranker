# ── Approach ──────────────────────────────────────────────────────────────────
approach_summary: >
  Rule-based scoring pipeline with five weighted components and a behavioral
  multiplier. We process 100K candidates using a streaming heapq (O(N log K),
  constant memory) without any external API calls. Skills are scored via a
  trust formula (proficiency × endorsements / 25 × duration_months / 18) that
  defeats keyword stuffing — an expert skill with 0 months of usage scores 0,
  not 1. Career history descriptions are deliberately NOT scanned because they
  are recycled template blocks in this dataset; we rely on the skills array and
  redrob_signals instead. Honeypots are detected and scored 0.01 before any
  component computation runs.

key_design_decisions:
  - "No career description scanning — descriptions are recycled templates"
  - "Trust formula on skills — proficiency × endorsements × duration_months"
  - "Behavioral multiplier is multiplicative, not additive"
  - "Consulting-firm career modifier ×0.4 encodes JD disqualifier directly"
  - "heapq O(N log K) — only top-100 ever held in memory"
  - "saved_by_recruiters_30d used as a sort tiebreaker only, never a score multiplier"
  - "No external APIs or GPU — pure stdlib Python for the ranking pipeline"

# ── Technical Specs ───────────────────────────────────────────────────────────
python_version: "3.11"
runtime_estimate_seconds: 15          # measured 10-13s on CPU for the full 100K candidates
                                       # (diagnose.py: 10.0s; direct scorer.py run: 12.7s);
                                       # 15s leaves headroom for slower grading hardware.
                                       # Budget is 300s (5 min) — well within limit.
ram_estimate_gb: 2                    # heapq keeps only top-100 in memory
uses_gpu: false
uses_external_api_during_ranking: false
uses_pretrained_model: false

# ── Scoring Weights ───────────────────────────────────────────────────────────
component_weights:
  title_career: 0.35
  skills: 0.30
  experience: 0.15
  location: 0.10
  education: 0.10
behavioral_multiplier_range: "0.25 – 1.10"

