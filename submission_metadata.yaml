  - "Claude (Anthropic)"

ai_usage_summary: |
  Used Claude for architectural discussion, code review, and test case design.
  All scoring logic, weights, and design decisions were authored by the team.
  No candidate data was fed to any LLM. The final ranker is pure rule-based
  Python with no ML model or pre-trained embeddings.

# ── Methodology Summary ───────────────────────────────────────────────────────
methodology_summary: |
  Rule-based trust-weighted scoring pipeline v3. Five components:
  (1) Title/Career (35%): keyword matching on current title + company-type
      modifier across career history. Pure consulting careers (TCS/Wipro/
      Infosys/Accenture/Cognizant) penalised ×0.4 per JD requirement.
  (2) Skills (30%): trust formula = proficiency_weight × min(1, endorsements/25)
      × min(1, duration_months/18). Expert skill with 0 months = 0.0 trust.
      Defeats keyword stuffing without any ML.
  (3) Experience (15%): sweet spot 5–9 years per JD. Below 2 years = 0.
  (4) Location (10%): India preferred; outside India without relocation = heavy
      penalty.
  (5) Education (5%): institution tier + CS-field bonus. Weak signal; JD has
      no educational requirement.
  Production-evidence bonus (up to +0.12): Category-based (relevant systems,
      evaluation, ownership, operational) with concept-level semantic matching.
      Now recognizes both IR vocabulary (BM25, NDCG, learning to rank) and
      production-ML vocabulary (XGBoost, discovery feed, optimization target,
      offline-online correlation, drift detection, retraining cadence).
  Behavioral multiplier (0.25–1.10×) applied multiplicatively to base score.
  Honeypots detected first (expert + 0 months, impossible career timelines) and
  scored 0.01. Streaming heapq O(N log K) — only top-100 ever in memory.
  Runtime: 7–13 seconds for 100K candidates on CPU.

# ── Key Design Decisions ──────────────────────────────────────────────────────
key_design_decisions:
  - "No career description scanning — descriptions are recycled templates in the dataset"
  - "Trust formula on skills — proficiency × endorsements × duration_months defeats keyword stuffing"
  - "Behavioral multiplier is multiplicative, not additive — makes availability penalties severe"
  - "Consulting-firm career modifier ×0.4 directly encodes JD disqualifier"
  - "Production-evidence bonus uses concept-level semantic matching, not keyword presence"
  - "Offline-online correlation uses co-occurrence heuristic (both terms + correlation verb) not literal phrases"
  - "Production-evidence bonus capped at 0.12 (up from 0.07) — more weight than education for ranking role"
  - "Education weight reduced to 0.05 — JD has no education requirement"
  - "heapq O(N log K) — only top-100 ever held in memory"
  - "saved_by_recruiters_30d used only as sort tiebreaker, never a score multiplier"
  - "No external APIs or GPU — pure stdlib Python for the ranking pipeline"

